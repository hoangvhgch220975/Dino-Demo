<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>dino_logo.png">
    <title>Dino Cloud</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #090d16;
        font-family: 'Outfit', sans-serif;
        color: #ffffff;
        overflow: hidden;
      }
      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        position: relative;
      }
      .glow-back {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        pointer-events: none;
        animation: pulse-glow 3s infinite ease-in-out;
      }
      .logo-wrapper {
        position: relative;
        z-index: 2;
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: float 4s infinite ease-in-out;
      }
      .logo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
      }
      .title-container {
        z-index: 2;
        text-align: center;
      }
      .splash-title {
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
      }
      .splash-sub {
        font-size: 0.95rem;
        color: #818cf8;
        font-weight: 400;
        margin: 0 0 32px 0;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        opacity: 0.8;
      }
      .loader-bar-container {
        z-index: 2;
        width: 180px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 99px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .loader-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #818cf8, #4f46e5);
        border-radius: 99px;
        animation: loading-slide 1.8s infinite ease-in-out;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-8px) scale(1.02); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      }
      @keyframes loading-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but Dino Cloud doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app">
      <div class="splash-container">
        <div class="glow-back"></div>
        <div class="logo-wrapper">
          <img class="logo-img" src="<%= BASE_URL %>dino_logo.png" alt="Dino Cloud Logo">
        </div>
        <div class="title-container">
          <h1 class="splash-title">Dino Cloud</h1>
          <p class="splash-sub">Next-Gen Cloud Workspace</p>
        </div>
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
      </div>
    </div>
    <!-- built files will be auto injected -->
  </body>
</html>
